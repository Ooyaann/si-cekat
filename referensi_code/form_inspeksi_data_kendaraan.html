<!DOCTYPE html><html lang="id" style=""><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>SI-CEKAT - Inspeksi Baru</title>

                      "on-surface-variant": "#43474f",
                      "inverse-on-surface": "#f1f0f5",
                      "tertiary-fixed": "#ffdcc2",
                      "surface-container-low": "#f4f3f8",
                      "on-secondary-container": "#684000",
                      "on-tertiary-fixed-variant": "#6b3b09",
                      "surface-variant": "#e3e2e7",
                      "secondary-container": "#fea619",
                      "on-tertiary-fixed": "#2e1500",
                      "surface-bright": "#faf9fe",
                      "status-danger": "#DC2626",
                      "on-tertiary-container": "#db9960",
                      "primary-fixed-dim": "#abc7ff",
                      "neutral-dark": "#1E293B",
                      "surface-container": "#eeedf2",
                      "surface-container-high": "#e8e7ec",
                      "primary-container": "#1a3c6e",
                      "tertiary-container": "#5e3100",

                      "on-primary": "#ffffff",
                      "neutral-mid": "#64748B",
                      "tertiary-fixed-dim": "#feb87c",
                      "on-primary-fixed": "#001b3f",

                      "inverse-primary": "#abc7ff",
                      "surface-container-lowest": "#ffffff",
                      "status-warning": "#D97706",
                      "tertiary": "#3e1f00",
                      "status-success": "#16A34A",
                      "outline-variant": "#c4c6d0",
                      "primary-fixed": "#d7e3ff",
                      "on-secondary": "#ffffff",
                      "on-secondary-fixed": "#2a1700",
                      "surface": "#faf9fe",
                      "on-surface": "#1a1b1f",
                      "surface-container-highest": "#e3e2e7",
                      "secondary-fixed-dim": "#ffb95f",
                      "background": "#faf9fe",
                      "secondary": "#855300",
                      "neutral-light": "#F1F5F9",
                      "on-secondary-fixed-variant": "#653e00",
                      "on-background": "#1a1b1f",
                      "on-primary-fixed-variant": "#264679",
                      "surface-tint": "#405e92",
                      "error": "#ba1a1a",
                      "on-primary-container": "#8aa8e0",
                      "surface-dim": "#dad9de",

              },
              "borderRadius": {
                      "DEFAULT": "0.125rem",
                      "lg": "0.25rem",
                      "xl": "0.5rem",
                      "full": "0.75rem"
              },
              "spacing": {
                      "margin-mobile": "16px",
                      "gutter": "16px",
                      "unit": "4px",

              },
              "fontFamily": {

                      "technical-data": ["JetBrains Mono"],

              },
              "fontSize": {

                      "technical-data": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],

                      "body-md": ["14px", { "lineHeight": "1.5", "fontWeight": "400" }],
                      "body-lg": ["16px", { "lineHeight": "1.6", "fontWeight": "400" }],
                      "headline-sm": ["20px", { "lineHeight": "1.4", "fontWeight": "600" }],
                      "headline-lg-mobile": ["26px", { "lineHeight": "1.2", "fontWeight": "700" }],
                      "display-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }]
              }
            }
          }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.filled {
            font-variation-settings: 'FILL' 1;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-page-bg text-on-surface font-body-md min-h-screen flex flex-col">
<!-- Top Navigation (Task-Focused - Close action implies temporary departure from main flow) -->
<header class="bg-surface border-b border-neutral-light shadow-[0px_4px_12px_rgba(30,41,59,0.05)] sticky top-0 z-50">
<div class="flex justify-between items-center px-margin-mobile h-14 w-full">
<button class="text-primary hover:bg-surface-container-high transition-colors p-2 rounded-full active:scale-95 flex items-center justify-center">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
<h1 class="font-headline-sm text-headline-sm font-bold text-primary text-center flex-1">Inspeksi Baru</h1>
<div class="w-10"></div> <!-- Placeholder for balance -->
</div>
<!-- Progress Bar -->
<div class="w-full bg-surface-variant h-1">
<div class="bg-primary h-1 w-1/6 transition-all duration-300"></div>
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 overflow-y-auto px-margin-mobile py-[24px] md:max-w-[800px] md:mx-auto w-full flex flex-col gap-[32px]">
<!-- Step Indicator & Timestamp -->
<div class="flex justify-between items-end border-b border-neutral-light pb-3">
<div>
<p class="font-label-caps text-label-caps text-neutral-mid mb-1 uppercase">Langkah 1 dari 6</p>
<h2 class="font-headline-sm text-headline-sm text-neutral-dark">Data Kendaraan</h2>
</div>
<div class="text-right">
<p class="font-label-caps text-label-caps text-neutral-mid mb-1 uppercase">Waktu Inspeksi</p>
<p class="font-technical-data text-technical-data text-neutral-dark" id="current-timestamp">24 Okt 2023 08:30</p>
</div>
</div>
<!-- Form Section -->
<section class="bg-surface border border-neutral-light rounded-xl shadow-[0px_4px_12px_rgba(30,41,59,0.05)] p-margin-mobile flex flex-col gap-[12px]">
<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-neutral-dark uppercase" for="location-select">Nama Lokasi/Pool</label>
<div class="relative">
<select class="w-full bg-surface border border-neutral-light rounded-lg h-touch-target-min px-3 appearance-none font-body-lg text-body-lg text-neutral-dark focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none transition-shadow" id="location-select">
<option disabled="" selected="" value="">Pilih Lokasi...</option>
<option value="terminal-pulo-gebang">Terminal Pulo Gebang</option>
<option value="pool-sinar-jaya">Pool Sinar Jaya</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-neutral-mid pointer-events-none">arrow_drop_down</span>
</div>
</div>

<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-neutral-dark uppercase" for="vehicle-select">Pilih Nomor Kendaraan</label>
<div class="relative">
<select class="w-full bg-surface border border-neutral-light rounded-lg h-touch-target-min px-3 appearance-none font-body-lg text-body-lg text-neutral-dark focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none transition-shadow" id="vehicle-select">
<option disabled="" selected="" value="">Pilih Armada...</option>
<option value="B1234XYZ">B 1234 XYZ</option>
<option value="D5678ABC">D 5678 ABC</option>
<option value="L9012DEF">L 9012 DEF</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-neutral-mid pointer-events-none">arrow_drop_down</span>
</div>
</div>

<div class="h-px bg-neutral-light my-2"></div>

<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-neutral-mid uppercase">Nama Pengemudi</label>
<div class="w-full bg-surface-container-low border border-neutral-light rounded-lg min-h-[44px] px-3 py-2 flex items-center">
<span class="font-body-lg text-body-lg text-neutral-mid" id="field-driver">-</span>
</div>
</div>

<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-neutral-mid uppercase">Nomor STUK</label>
<div class="w-full bg-surface-container-low border border-neutral-light rounded-lg min-h-[44px] px-3 py-2 flex items-center">
<span class="font-technical-data text-technical-data text-neutral-mid" id="field-stuk">-</span>
</div>
</div>

<div class="flex flex-col gap-2">
<label class="font-label-caps text-label-caps text-neutral-dark uppercase">Jenis Trayek</label>
<div class="grid grid-cols-2 gap-3">
<label class="flex items-center gap-2 cursor-pointer">
<input type="radio" name="trayek-type" value="AKAP" class="w-5 h-5 text-primary focus:ring-primary border-neutral-light">
<span class="text-body-md">AKAP</span>
</label>
<label class="flex items-center gap-2 cursor-pointer">
<input type="radio" name="trayek-type" value="AKDP" class="w-5 h-5 text-primary focus:ring-primary border-neutral-light">
<span class="text-body-md">AKDP</span>
</label>
<label class="flex items-center gap-2 cursor-pointer">
<input type="radio" name="trayek-type" value="Pariwisata" class="w-5 h-5 text-primary focus:ring-primary border-neutral-light">
<span class="text-body-md">Pariwisata</span>
</label>
<label class="flex items-center gap-2 cursor-pointer">
<input type="radio" name="trayek-type" value="MPU" class="w-5 h-5 text-primary focus:ring-primary border-neutral-light">
<span class="text-body-md">MPU</span>
</label>
</div>
</div>

<div class="flex flex-col gap-1">
<label class="font-label-caps text-label-caps text-neutral-dark uppercase" for="field-trayek-input">Trayek</label>
<input type="text" id="field-trayek-input" placeholder="Contoh: Jakarta - Bandung" class="w-full bg-surface border border-neutral-light rounded-lg h-touch-target-min px-3 font-body-lg text-body-lg text-neutral-dark focus:ring-2 focus:ring-primary focus:border-primary focus:outline-none transition-shadow">
</div>
</section>
</main>
<!-- Bottom Action Bar -->
<footer class="bg-surface border-t border-neutral-light p-margin-mobile shadow-[0px_-4px_12px_rgba(30,41,59,0.05)] sticky bottom-0 z-50 md:max-w-[800px] md:mx-auto w-full md:rounded-t-xl md:border-x">
<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm h-touch-target-min rounded-[6px] flex justify-center items-center gap-2 active:scale-95 transition-transform duration-150 shadow-sm opacity-50 cursor-not-allowed" disabled="" id="next-btn">
<span class="">Lanjut ke Unsur Administrasi</span>
<span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</footer>
<script>
        // Set current timestamp
        const now = new Date();
        const options = { day: 'numeric', month: 'short', year: 'numeric', hour: '2-digit', minute: '2-digit' };
        document.getElementById('current-timestamp').textContent = now.toLocaleDateString('id-ID', options).replace(/\./g, ':');

        // Mock auto-fill logic
        const vehicleSelect = document.getElementById('vehicle-select');
        const nextBtn = document.getElementById('next-btn');
        const fieldStuk = document.getElementById('field-stuk');
        const fieldPo = document.getElementById('field-po');
        const fieldTrayek = document.getElementById('field-trayek');

        const mockData = {
            'B1234XYZ': { stuk: 'STUK/2023/10/001', po: 'PO. Sinar Jaya', trayek: 'Jakarta - Surabaya' },
            'D5678ABC': { stuk: 'STUK/2023/10/045', po: 'PO. Budiman', trayek: 'Bandung - Tasikmalaya' },
            'L9012DEF': { stuk: 'STUK/2023/10/112', po: 'PO. Eka', trayek: 'Surabaya - Solo' }
        };

        vehicleSelect.addEventListener('change', (e) => {
            const val = e.target.value;
            if (val && mockData[val]) {
                const data = mockData[val];
                
                // Update text
                fieldStuk.textContent = data.stuk;
                fieldPo.textContent = data.po;
                fieldTrayek.textContent = data.trayek;

                // Update styles to look active
                [fieldStuk, fieldPo, fieldTrayek].forEach(el => {
                    el.classList.remove('text-neutral-mid');
                    el.classList.add('text-neutral-dark');
                    el.parentElement.classList.remove('bg-surface-container-low');
                    el.parentElement.classList.add('bg-surface');
                });

                // Enable button
                nextBtn.disabled = false;
                nextBtn.classList.remove('opacity-50', 'cursor-not-allowed');
                nextBtn.classList.add('hover:bg-primary-container');
            }
        });
    </script>
</body></html>
