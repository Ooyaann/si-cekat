<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>Login - SI-CEKAT</title>

                    },
                    "borderRadius": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }
        
        .tab-btn.active {
            border-bottom: 2px solid theme('colors.primary');
            color: theme('colors.primary');
        }
        .tab-btn.inactive {
            border-bottom: 2px solid transparent;
            color: theme('colors.neutral-mid');
        }
        
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
            animation: fadeIn 0.3s ease-in-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(4px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-page-bg min-h-screen flex items-center justify-center p-gutter md:p-margin-desktop text-on-surface">
<div class="w-full max-w-[400px] bg-surface-container-lowest border border-neutral-light rounded-xl shadow-[0px_4px_12px_rgba(30,41,59,0.05)] overflow-hidden">
<!-- Header -->
<div class="p-8 pb-6 text-center">
<div class="flex justify-center mb-4">
<span class="material-symbols-outlined text-primary" style="font-size: 48px;">local_shipping</span>
</div>
<h1 class="font-headline-md text-headline-md text-primary mb-2">SI-CEKAT</h1>
<p class="font-body-md text-body-md text-neutral-mid">Selamat Datang di Sistem Inspeksi</p>
</div>
<!-- Tab Switcher -->
<div class="flex border-b border-neutral-light px-6">
<button class="flex-1 py-3 tab-btn active font-label-caps text-label-caps uppercase transition-colors" id="tab-supir" onclick="switchTab('supir')">Supir</button>
<button class="flex-1 py-3 tab-btn inactive font-label-caps text-label-caps uppercase transition-colors" id="tab-admin" onclick="switchTab('admin')">Admin</button>
</div>
<!-- Content Area -->
<div class="p-6">
<!-- Supir Form -->
<div class="form-section active space-y-[12px]" id="form-supir">
<div>
<label class="block font-label-caps text-label-caps text-neutral-mid mb-[4px] uppercase">Nomor SIM</label>
<input class="w-full h-touch-target-min px-3 bg-surface-container-lowest border border-neutral-light rounded focus:ring-2 focus:ring-primary focus:border-primary font-technical-data text-technical-data text-on-surface outline-none transition-shadow" placeholder="Masukkan Nomor SIM" type="text">
</div>
<div>
<label class="block font-label-caps text-label-caps text-neutral-mid mb-[4px] uppercase">PIN</label>
<input class="w-full h-touch-target-min px-3 bg-surface-container-lowest border border-neutral-light rounded focus:ring-2 focus:ring-primary focus:border-primary font-technical-data text-technical-data text-on-surface outline-none transition-shadow" placeholder="Masukkan PIN" type="password">
</div>
</div>
<!-- Admin Form -->
<div class="form-section space-y-[12px]" id="form-admin">
<div>
<label class="block font-label-caps text-label-caps text-neutral-mid mb-[4px] uppercase">Username</label>
<input class="w-full h-touch-target-min px-3 bg-surface-container-lowest border border-neutral-light rounded focus:ring-2 focus:ring-primary focus:border-primary font-technical-data text-technical-data text-on-surface outline-none transition-shadow" placeholder="admin@sicekat.com" type="text">
</div>
<div>
<label class="block font-label-caps text-label-caps text-neutral-mid mb-[4px] uppercase">Password</label>
<input class="w-full h-touch-target-min px-3 bg-surface-container-lowest border border-neutral-light rounded focus:ring-2 focus:ring-primary focus:border-primary font-technical-data text-technical-data text-on-surface outline-none transition-shadow" placeholder="••••••••" type="password">
</div>
</div>
<!-- Actions -->
<div class="mt-[32px]">
<button class="w-full h-touch-target-min bg-status-warning text-neutral-dark font-label-caps text-label-caps uppercase rounded-md hover:bg-opacity-90 active:scale-[0.98] transition-all">
                    Masuk
                </button>
</div>
</div>
<!-- Footer -->
<div class="p-6 pt-0 text-center">
<a class="font-body-md text-body-md text-primary hover:underline" href="#">Lupa Password?</a>
</div>
</div>
<script>
        function switchTab(tabId) {
            // Update Buttons
            document.getElementById('tab-supir').classList.replace(tabId === 'supir' ? 'inactive' : 'active', tabId === 'supir' ? 'active' : 'inactive');
            document.getElementById('tab-admin').classList.replace(tabId === 'admin' ? 'inactive' : 'active', tabId === 'admin' ? 'active' : 'inactive');
            
            // Update Forms
            document.getElementById('form-supir').classList.toggle('active', tabId === 'supir');
            document.getElementById('form-admin').classList.toggle('active', tabId === 'admin');
        }
    </script>
</body></html>
