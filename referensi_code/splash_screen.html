<!DOCTYPE html><html lang="id"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>SI-CEKAT - Splash Screen</title>

                    },
                    "borderRadius": {

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-symbols-outlined[data-weight="fill"] {
            font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .animate-pulse-slow {
            animation: pulse-slow 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-primary-container h-screen w-screen overflow-hidden flex flex-col items-center justify-between text-on-primary font-body-md selection:bg-surface-tint selection:text-on-primary">
<!-- Top Spacer for visual balance -->
<div class="flex-1"></div>
<!-- Center Content: Logo and Title -->
<main class="flex flex-col items-center justify-center space-y-6 flex-1 z-10 w-full max-w-sm px-margin-mobile">
<!-- Logo Icon Container (Glassmorphism inspired ring) -->
<div class="relative flex items-center justify-center w-24 h-24 rounded-full border border-on-primary/20 bg-on-primary/5 shadow-[0px_4px_24px_rgba(0,0,0,0.2)] backdrop-blur-sm">
<span class="material-symbols-outlined text-[48px] text-on-primary" data-icon="directions_bus" data-weight="fill">directions_bus</span>
<!-- Decorative inner ring -->
<div class="absolute inset-0 rounded-full border border-on-primary/10 scale-90"></div>
</div>
<!-- Brand Name -->
<div class="text-center space-y-2">
<h1 class="font-display-lg text-display-lg text-on-primary tracking-tight">SI-CEKAT</h1>
<p class="font-body-md text-body-md text-on-primary/80 font-medium tracking-wide opacity-90">
                Sistem Cek Armada Terpadu
            </p>
</div>
</main>
<!-- Bottom Actions / Loading -->
<footer class="flex-1 flex flex-col justify-end pb-12 w-full max-w-sm px-margin-mobile z-10">
<!-- Interactive 'Get Started' Button acting as entry point -->
<button class="w-full bg-on-primary text-primary-container font-body-lg text-body-lg font-semibold py-4 rounded-xl shadow-[0px_4px_12px_rgba(0,0,0,0.1)] active:scale-[0.98] transition-transform duration-200 flex items-center justify-center gap-2 group hover:bg-surface-bright" id="getStartedBtn">
<span>Mulai Inspeksi</span>
<span class="material-symbols-outlined transition-transform duration-200 group-hover:translate-x-1" data-icon="arrow_forward">arrow_forward</span>
</button>
<!-- Subtle Version Info -->
<div class="mt-8 text-center w-full">
<p class="font-label-caps text-label-caps text-on-primary/50 tracking-widest uppercase">
                V 2.4.1 • PROD
            </p>
</div>
</footer>
<!-- Background Atmospheric Effects (Minimalist) -->
<div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
<!-- Gradient Overlay for depth -->
<div class="absolute inset-0 bg-gradient-to-b from-primary/20 via-transparent to-primary/80"></div>
<!-- Subtle noise texture (simulated with CSS background blend if an image was allowed, but we keep it clean CSS here) -->
<div class="absolute top-[-10%] left-[-10%] w-[120%] h-[120%] bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-on-primary/5 via-transparent to-transparent blur-3xl opacity-50"></div>
</div>
<script>
        // Simple micro-interaction for the button
        document.getElementById('getStartedBtn').addEventListener('click', function(e) {
            // Add a loading state visually before navigation (simulated)
            const btn = e.currentTarget;
            const originalText = btn.innerHTML;
            
            btn.innerHTML = `<span class="material-symbols-outlined animate-spin" data-icon="sync">sync</span><span class="ml-2">Memuat Sistem...</span>`;
            btn.classList.add('opacity-80', 'cursor-not-allowed');
            
            // Re-initialize icon for the new HTML
            const newIcon = btn.querySelector('.material-symbols-outlined');
            if(newIcon) {
                newIcon.style.fontVariationSettings = "'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24";
            }

            // Simulate transition delay
            setTimeout(() => {
                // In a real app, window.location.href = '/home';
                btn.innerHTML = originalText;
                btn.classList.remove('opacity-80', 'cursor-not-allowed');
            }, 1500);
        });
    </script>
</body></html>
