<!DOCTYPE html><html class="light" lang="en"><head>

        body { background-color: #F8FAFC; }
    </style>

    body {
      min-height: max(884px, 100dvh);
    }

<body class="bg-page-bg text-on-background min-h-screen flex flex-col antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- TopAppBar -->
<header class="bg-surface dark:bg-inverse-surface border-b border-surface-container-high dark:border-outline-variant docked full-width top-0 z-50">
<div class="flex justify-between items-center w-full px-margin-mobile h-touch-target-min">
<button aria-label="Back" class="flex items-center justify-center w-10 h-10 text-primary dark:text-inverse-primary hover:bg-surface-container-low dark:hover:bg-surface-variant rounded-full transition-colors duration-200 ease-in-out">
<span class="material-symbols-outlined text-headline-md">arrow_back</span>
</button>
<div class="flex-1 text-center">
<h1 class="font-headline-sm text-headline-sm font-bold text-primary dark:text-inverse-primary tracking-tight">Tambah Armada Baru</h1>
</div>
<div class="w-10"></div> <!-- Spacer for centering -->
</div>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 px-margin-mobile py-6 overflow-y-auto w-full max-w-lg mx-auto">
<form class="space-y-[32px]">
<!-- Technical Data Section -->
<div class="bg-surface-container-lowest rounded-xl p-6 border border-neutral-light shadow-sm space-y-6">
<div class="space-y-1">
<h2 class="font-headline-sm text-headline-sm text-primary">Identifikasi Kendaraan</h2>
<p class="font-body-md text-body-md text-neutral-mid">Masukkan data identitas utama kendaraan operasional.</p>
</div>
<div class="space-y-[12px]">
<!-- Nomor Polisi -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="nomor_polisi">Nomor Polisi (Plat)</label>
<input class="w-full bg-surface-container-lowest border border-neutral-light rounded-[6px] px-4 py-3 font-technical-data text-technical-data text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow h-[44px] uppercase placeholder-neutral-mid/50" id="nomor_polisi" name="nomor_polisi" placeholder="Contoh: B 1234 CD" required="" type="text">
</div>
<!-- Nomor STUK -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="nomor_stuk">Nomor STUK</label>
<input class="w-full bg-surface-container-lowest border border-neutral-light rounded-[6px] px-4 py-3 font-technical-data text-technical-data text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow h-[44px] placeholder-neutral-mid/50" id="nomor_stuk" name="nomor_stuk" placeholder="Nomor Uji Berkala" required="" type="text">
</div>
</div>
</div>
<!-- Spesifikasi Section -->
<div class="bg-surface-container-lowest rounded-xl p-6 border border-neutral-light shadow-sm space-y-6">
<div class="space-y-1">
<h2 class="font-headline-sm text-headline-sm text-primary">Spesifikasi Armada</h2>
</div>
<div class="space-y-[12px]">
<!-- Merk/Brand -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="merk">Merk / Brand</label>
<input class="w-full bg-surface-container-lowest border border-neutral-light rounded-[6px] px-4 py-3 font-body-lg text-body-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow h-[44px] placeholder-neutral-mid/50" id="merk" name="merk" placeholder="Contoh: Hino, Mitsubishi" required="" type="text">
</div>
<!-- Tahun Pembuatan & Kapasitas Grid -->
<div class="grid grid-cols-2 gap-4">
<!-- Tahun -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="tahun">Tahun</label>
<input class="w-full bg-surface-container-lowest border border-neutral-light rounded-[6px] px-4 py-3 font-technical-data text-technical-data text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow h-[44px] placeholder-neutral-mid/50" id="tahun" max="2025" min="1990" name="tahun" placeholder="YYYY" required="" type="number">
</div>
<!-- Kapasitas -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="kapasitas">Kapasitas (Orang/Kg)</label>
<input class="w-full bg-surface-container-lowest border border-neutral-light rounded-[6px] px-4 py-3 font-body-lg text-body-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow h-[44px] placeholder-neutral-mid/50" id="kapasitas" name="kapasitas" placeholder="Contoh: 40 Orang" required="" type="text">
</div>
</div>
<!-- Jenis Angkutan -->
<div>
<label class="block font-label-caps text-label-caps text-on-surface-variant mb-2" for="jenis_angkutan">Jenis Angkutan</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-lowest border border-neutral-light rounded-[6px] px-4 py-3 font-body-lg text-body-lg text-on-surface focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-shadow h-[44px]" id="jenis_angkutan" name="jenis_angkutan" required="">
<option disabled="" selected="" value="">Pilih Jenis Angkutan</option>
<option value="AKAP">AKAP (Antar Kota Antar Provinsi)</option>
<option value="AKDP">AKDP (Antar Kota Dalam Provinsi)</option>
<option value="Pariwisata">Pariwisata</option>
<option value="Barang">Angkutan Barang</option>
</select>
<div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-4 text-neutral-mid">
<span class="material-symbols-outlined">expand_more</span>
</div>
</div>
</div>
</div>
</div>
<!-- Action Area -->
<div class="pt-4 pb-8 space-y-[12px]">
<button class="w-full h-touch-target-min flex items-center justify-center bg-primary text-on-primary font-headline-sm text-headline-sm rounded-[6px] transition-transform active:scale-[0.98] shadow-sm hover:bg-primary-fixed-variant hover:text-on-primary-fixed-variant" type="button">
                    Simpan Data Armada
                </button>
<button class="w-full h-touch-target-min flex items-center justify-center bg-surface-container-lowest text-neutral-dark font-body-lg text-body-lg border border-neutral-light rounded-[6px] transition-colors hover:bg-surface-container-low active:bg-surface-container" type="button">
                    Batal
                </button>
</div>
</form>
</main>
<!-- Navigation Shell suppressed because this is a transactional sub-page with a 'Cancel'/'Back' action flow -->
</body></html>
