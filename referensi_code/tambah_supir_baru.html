<body class="bg-page-bg font-body-lg text-on-surface antialiased min-h-screen flex flex-col">
<header class="bg-surface border-b border-surface-container-high w-full top-0 z-50 flex justify-between items-center px-margin-mobile h-touch-target-min sticky">
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:bg-surface-container-low transition-colors duration-200 ease-in-out p-1 rounded-full flex items-center justify-center">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">menu</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">SI-CEKAT</h1>
</div>
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-full bg-primary-container text-on-primary-container flex items-center justify-center font-label-caps text-label-caps">
                AU
            </div>
</div>
</header>
<main class="flex-1 flex flex-col px-margin-mobile py-8 max-w-[800px] w-full mx-auto pb-[120px]">
<div class="mb-8">
<button class="flex items-center gap-2 text-primary font-label-caps text-label-caps mb-4 hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined text-body-lg" style="font-variation-settings: 'FILL' 0;">arrow_back</span>
                Kembali
            </button>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile text-primary">Tambah Supir Baru</h2>
<p class="font-body-md text-body-md text-neutral-mid mt-2">Masukkan data teknis supir untuk registrasi armada.</p>
</div>
<form class="flex flex-col gap-8 bg-surface-container-lowest p-6 rounded-xl border border-neutral-light shadow-[0px_4px_12px_rgba(30,41,59,0.02)]">
<div class="flex flex-col items-center justify-center border-2 border-dashed border-outline-variant bg-surface-bright rounded-xl p-8 cursor-pointer hover:border-primary hover:bg-surface-container-low transition-all group">
<div class="w-16 h-16 rounded-full bg-surface-container-high flex items-center justify-center mb-4 group-hover:bg-primary-fixed transition-colors">
<span class="material-symbols-outlined text-[32px] text-neutral-mid group-hover:text-primary" style="font-variation-settings: 'FILL' 0;">add_a_photo</span>
</div>
<span class="font-label-caps text-label-caps text-primary">UNGGAH FOTO SUPIR</span>
<span class="font-body-md text-body-md text-neutral-mid mt-1 text-center">Format JPG atau PNG (Maks. 2MB)</span>
</div>
<div class="flex flex-col gap-[12px]">
<div class="flex flex-col gap-1.5">
<label class="font-label-caps text-label-caps text-neutral-dark uppercase tracking-wider" for="fullName">Full Name</label>
<input class="h-touch-target-min px-4 rounded-lg bg-surface-container-lowest border border-neutral-light text-on-surface font-body-lg text-body-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="fullName" placeholder="Contoh: Budi Santoso" type="text">
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label-caps text-label-caps text-neutral-dark uppercase tracking-wider" for="nomorSim">Nomor SIM</label>
<div class="relative flex items-center">
<span class="absolute left-4 material-symbols-outlined text-neutral-mid" style="font-variation-settings: 'FILL' 0;">badge</span>
<input class="w-full h-touch-target-min pl-12 pr-4 rounded-lg bg-surface-container-lowest border border-neutral-light text-on-surface font-technical-data text-technical-data focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="nomorSim" placeholder="0000-0000-0000" type="text">
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label-caps text-label-caps text-neutral-dark uppercase tracking-wider" for="expiryDate">Masa Berlaku SIM</label>
<div class="relative flex items-center">
<span class="absolute left-4 material-symbols-outlined text-neutral-mid" style="font-variation-settings: 'FILL' 0;">calendar_month</span>
<input class="w-full h-touch-target-min pl-12 pr-4 rounded-lg bg-surface-container-lowest border border-neutral-light text-on-surface font-technical-data text-technical-data focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" id="expiryDate" type="date">
</div>
</div>
<div class="flex flex-col gap-1.5">
<label class="font-label-caps text-label-caps text-neutral-dark uppercase tracking-wider" for="phoneNumber">Phone Number</label>
<div class="relative flex items-center">
<span class="absolute left-4 material-symbols-outlined text-neutral-mid" style="font-variation-settings: 'FILL' 0;">call</span>
<input class="w-full h-touch-target-min pl-12 pr-4 rounded-lg bg-surface-container-lowest border border-neutral-light text-on-surface font-technical-data text-technical-data focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-outline-variant" id="phoneNumber" placeholder="+62 8XX XXXX XXXX" type="tel">
</div>
</div>
</div>
</form>
</main>
<div class="fixed bottom-0 left-0 right-0 bg-surface border-t border-neutral-light p-4 flex gap-4 shadow-[0px_-4px_12px_rgba(30,41,59,0.05)] z-40 max-w-[800px] mx-auto">
<button class="flex-1 h-touch-target-min rounded-lg border border-outline-variant text-neutral-dark font-label-caps text-label-caps flex items-center justify-center hover:bg-surface-container-low transition-colors" type="button">
            BATAL
        </button>
<button class="flex-1 h-touch-target-min rounded-lg bg-primary text-on-primary font-label-caps text-label-caps flex items-center justify-center shadow-[0px_4px_12px_rgba(30,41,59,0.1)] hover:bg-primary-container transition-colors" type="submit">
            SIMPAN DATA
        </button>
</div>
